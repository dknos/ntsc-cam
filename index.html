<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>NTSC Cam — analog encode/decode</title>
<style>
  :root { color-scheme: dark; }
  html,body { margin:0; padding:0; background:#000; color:#ddd; font:13px/1.4 ui-monospace,monospace; height:100%; overflow:hidden; }
  #stage { position:fixed; inset:0; display:grid; place-items:center; }
  #cv { background:#000; max-width:100%; max-height:100%; image-rendering:pixelated; }
  #panel {
    position:fixed; top:8px; left:8px; padding:10px 12px; border-radius:8px;
    background:rgba(15,15,18,0.78); border:1px solid #333; backdrop-filter:blur(6px);
    max-width:320px; max-height:96vh; overflow:auto; z-index:10;
  }
  #panel.hide { transform:translateX(-110%); transition:transform .25s; }
  #panel h1 { font-size:12px; margin:0 0 6px; letter-spacing:.05em; color:#7ee787; text-transform:uppercase;}
  #panel label { display:block; margin:6px 0 2px; color:#aaa; font-size:11px; }
  #panel input[type=range] { width:100%; }
  #panel select, #panel button, #panel input[type=text] {
    width:100%; box-sizing:border-box; padding:4px 6px; margin:2px 0;
    background:#1a1a1f; color:#ddd; border:1px solid #333; border-radius:4px;
    font:inherit;
  }
  #panel button:hover { background:#222; cursor:pointer; }
  #drop { padding:8px; border:1px dashed #444; border-radius:4px; text-align:center; color:#888; margin:4px 0; }
  #drop.over { border-color:#7ee787; color:#7ee787; }
  #status { font-size:11px; color:#888; margin-top:6px; padding-top:6px; border-top:1px solid #222; }
  #toggle {
    position:fixed; top:8px; right:8px; z-index:11;
    background:rgba(15,15,18,0.78); color:#ddd; border:1px solid #333;
    border-radius:50%; width:28px; height:28px; cursor:pointer; font-family:inherit;
  }
  .row { display:grid; grid-template-columns:1fr auto; gap:6px; align-items:center; }
  .row span { font-variant-numeric:tabular-nums; color:#7ee787; font-size:11px; min-width:38px; text-align:right; }
  .preset { display:flex; gap:4px; flex-wrap:wrap; margin:6px 0;}
  .preset button { width:auto; flex:1 1 auto; font-size:11px; padding:3px 6px;}
</style>
</head>
<body>
<button id="toggle" title="Hide controls">≡</button>
<div id="panel">
  <h1>NTSC Cam</h1>

  <label>Source</label>
  <select id="src">
    <option value="phonelink">Phone Link (S24 / Win11 virtual cam)</option>
    <option value="cam">Camera (DroidCam, webcam…)</option>
    <option value="display">Display / window</option>
    <option value="file">Video file</option>
    <option value="url">Video URL</option>
    <option value="none">Test pattern</option>
  </select>

  <div id="cam-row" style="display:none">
    <label>Camera device</label>
    <select id="device"><option>Loading…</option></select>
    <button id="rescan" title="Re-enumerate cameras">↻ rescan</button>
  </div>

  <div id="file-row" style="display:none">
    <div id="drop">drop a video here, or…</div>
    <input type="file" id="file" accept="video/*" style="display:none">
    <button id="filebtn">choose file</button>
  </div>

  <div id="url-row" style="display:none">
    <input type="text" id="url" placeholder="https://… mp4/webm">
    <button id="loadurl">load</button>
  </div>

  <label>Output size</label>
  <select id="size">
    <option value="1080x1920" selected>1080×1920 (Shorts vertical)</option>
    <option value="720x1280">720×1280 (Shorts low-res)</option>
    <option value="1920x1080">1920×1080 (16:9 horizontal)</option>
    <option value="1280x720">1280×720 (HD horizontal)</option>
    <option value="720x720">720×720 (square)</option>
    <option value="match">match source</option>
  </select>

  <div class="preset">
    <button data-p="vhs">VHS</button>
    <button data-p="cable">Cable TV</button>
    <button data-p="dirty">Dirty tape</button>
    <button data-p="clean">Clean NTSC</button>
    <button data-p="off">Bypass</button>
  </div>

  <label>Signal mode</label>
  <select id="mode">
    <option value="composite" selected>Composite (full artifacts)</option>
    <option value="svideo">S-Video (no dot crawl)</option>
    <option value="rgb">RGB (encode only, no decode)</option>
  </select>

  <label class="row">Noise <span id="v_noise">0.04</span></label>
  <input type="range" id="noise" min="0" max="0.4" step="0.005" value="0.04">

  <label class="row">Chroma bleed <span id="v_chroma">0.55</span></label>
  <input type="range" id="chroma" min="0" max="1" step="0.01" value="0.55">

  <label class="row">Dot crawl <span id="v_dot">0.6</span></label>
  <input type="range" id="dot" min="0" max="1.5" step="0.01" value="0.6">

  <label class="row">Ringing <span id="v_ring">0.35</span></label>
  <input type="range" id="ring" min="0" max="1" step="0.01" value="0.35">

  <label class="row">Scan jitter <span id="v_jit">0.0015</span></label>
  <input type="range" id="jit" min="0" max="0.02" step="0.0005" value="0.0015">

  <label class="row">VHS hue drift <span id="v_hue">0.04</span></label>
  <input type="range" id="hue" min="-0.5" max="0.5" step="0.005" value="0.04">

  <label class="row">Head switch (px from bottom) <span id="v_hsw">14</span></label>
  <input type="range" id="hsw" min="0" max="120" step="1" value="14">

  <label class="row">Saturation <span id="v_sat">1.05</span></label>
  <input type="range" id="sat" min="0" max="2" step="0.01" value="1.05">

  <label class="row">Brightness <span id="v_lum">1.0</span></label>
  <input type="range" id="lum" min="0.3" max="1.7" step="0.01" value="1.0">

  <label class="row">Bleed length (taps) <span id="v_taps">9</span></label>
  <input type="range" id="taps" min="3" max="21" step="2" value="9">

  <label class="row">Generation (re-record passes) <span id="v_gen">1</span></label>
  <input type="range" id="gen" min="1" max="4" step="1" value="1">

  <div id="status">init…</div>
</div>

<div id="stage"><canvas id="cv"></canvas></div>

<video id="vid" playsinline autoplay muted style="display:none"></video>

<script>
'use strict';
const $ = (id) => document.getElementById(id);

// ---- query string helpers --------------------------------------------------
const qs = new URLSearchParams(location.search);
const pickCam = qs.get('cam');
const pickSrc = qs.get('src');     // cam | display | file | url | none
const pickSize = qs.get('size');   // e.g. 1080x1920
const pickPreset = qs.get('preset');
const startURL = qs.get('video');
const hidePanel = qs.has('hud') && qs.get('hud') === 'off';

// ---- WebGL2 context --------------------------------------------------------
const cv = $('cv');
const gl = cv.getContext('webgl2', { alpha: false, antialias: false, premultipliedAlpha: false });
if (!gl) {
  $('status').textContent = 'WebGL2 unavailable. Use Chrome/Edge/Firefox latest.';
  throw new Error('no webgl2');
}

const VS = `#version 300 es
in vec2 a_pos;
out vec2 v_uv;
void main() {
  v_uv = a_pos * 0.5 + 0.5;
  gl_Position = vec4(a_pos, 0.0, 1.0);
}`;

// Fragment 1: encode RGB → composite-ish signal.
// We compute YIQ, low-pass chroma horizontally (chroma bandwidth limit),
// then modulate I,Q onto the NTSC subcarrier proxy. The "subcarrier" here is
// a per-pixel 4-cycle phase that produces dot-crawl when the decoder pulls it
// back out via subtraction. Output: encoded composite signal in R, raw Y in G,
// raw I in B, raw Q in A so we can bypass cleanly downstream.
const FS_ENCODE = `#version 300 es
precision highp float;
in vec2 v_uv;
out vec4 outC;

uniform sampler2D u_tex;
uniform vec2 u_res;        // canvas pixel size
uniform vec2 u_srcRes;     // source video pixel size (informational)
uniform float u_chromaBleed; // 0..1 strength of horizontal chroma blur
uniform int   u_taps;        // chroma low-pass tap count (odd)
uniform float u_subcarrier;  // dot crawl strength
uniform float u_jitter;      // horizontal scanline jitter
uniform float u_time;
uniform float u_brightness;
uniform float u_saturation;
uniform float u_hueDrift;    // chroma phase drift (radians-ish)
uniform int   u_modeRGB;     // 1 = bypass (return RGB)

vec3 rgb2yiq(vec3 c) {
  return mat3(
    0.299,  0.596,  0.211,
    0.587, -0.274, -0.523,
    0.114, -0.322,  0.312
  ) * c;
}

vec2 jitterUV(vec2 uv) {
  float row = floor(uv.y * u_res.y);
  // small per-line horizontal wobble; deterministic per frame
  float jit = (sin(row * 12.9898 + u_time * 2.0) + sin(row * 78.233 + u_time * 0.7)) * 0.5;
  return vec2(uv.x + jit * u_jitter, uv.y);
}

void main() {
  vec2 uv = jitterUV(v_uv);
  vec3 base = texture(u_tex, uv).rgb;
  if (u_modeRGB == 1) { outC = vec4(base * u_brightness, 1.0); return; }

  vec3 yiq = rgb2yiq(base);
  yiq.gb *= u_saturation;

  // Horizontal low-pass on chroma — accumulate weighted neighbors.
  float pxStep = 1.0 / u_res.x;
  int half_ = max(1, (u_taps - 1) / 2);
  float wsum = 0.0;
  vec2 chromaAcc = vec2(0.0);
  for (int i = -10; i <= 10; ++i) {
    if (i < -half_ || i > half_) continue;
    float t = float(i) / float(half_);
    float w = exp(-t * t * 2.5);
    wsum += w;
    vec3 nyiq = rgb2yiq(texture(u_tex, jitterUV(v_uv + vec2(float(i) * pxStep, 0.0))).rgb);
    chromaAcc += w * nyiq.gb;
  }
  vec2 chroma = mix(yiq.gb, chromaAcc / wsum, u_chromaBleed);

  // Hue drift: rotate I,Q by u_hueDrift radians.
  float c = cos(u_hueDrift), s = sin(u_hueDrift);
  vec2 chromaR = vec2(chroma.x * c - chroma.y * s, chroma.x * s + chroma.y * c);

  // Encode subcarrier — fake 4-cycle-per-pixel phase that the decoder cancels.
  float px = uv.x * u_res.x;
  float phase = px * 1.5707963; // pi/2 per pixel = 4 samples per cycle
  float sc = (chromaR.x * sin(phase) + chromaR.y * cos(phase)) * u_subcarrier * 0.25;
  float composite = yiq.r + sc;

  outC = vec4(composite, yiq.r, chromaR.x, chromaR.y);
  outC.a = 1.0;
  // Pack I,Q into B,A so downstream can recover them in S-Video mode without
  // re-doing the chroma low-pass.
  outC.b = chromaR.x * 0.5 + 0.5;
  // Channel A is alpha, blending might bite us; we'll use a separate FBO if
  // needed but for our straight-through chain alpha=1 lets us pass Q via... we
  // can't safely. We'll re-derive Q in the decoder by using sin(phase) on the
  // composite. So drop the Q packing and let the decoder do it.
}
`;

// Fragment 2: distort — noise, dropouts, head-switching tear at the bottom.
const FS_DISTORT = `#version 300 es
precision highp float;
in vec2 v_uv;
out vec4 outC;
uniform sampler2D u_tex;
uniform vec2 u_res;
uniform float u_noise;
uniform float u_time;
uniform float u_headSwitchPx;
uniform float u_ringing;

float hash(vec2 p){ p = fract(p*vec2(443.897,441.423)); p+=dot(p,p+19.19); return fract(p.x*p.y); }

void main() {
  vec2 uv = v_uv;
  // Head switching: tear the bottom N pixels horizontally.
  float fromBot = (1.0 - uv.y) * u_res.y;
  if (fromBot < u_headSwitchPx) {
    float warp = (u_headSwitchPx - fromBot) / max(1.0, u_headSwitchPx);
    float jitter = (hash(vec2(uv.y * 99.0, u_time)) - 0.5) * warp * 0.15;
    uv.x = uv.x + jitter;
  }

  vec4 c = texture(u_tex, uv);

  // Per-pixel noise on composite channel (R) only — preserves chroma cleanly.
  float n = (hash(uv * u_res + u_time) - 0.5) * 2.0 * u_noise;
  c.r += n;

  // Sharpen-then-overshoot ringing on composite (R).
  float pxStep = 1.0 / u_res.x;
  float l = texture(u_tex, vec2(uv.x - pxStep, uv.y)).r;
  float r = texture(u_tex, vec2(uv.x + pxStep, uv.y)).r;
  float ring = (c.r - 0.5*(l + r)) * u_ringing;
  c.r += ring;

  outC = c;
}
`;

// Fragment 3: decode composite → YIQ → RGB.
const FS_DECODE = `#version 300 es
precision highp float;
in vec2 v_uv;
out vec4 outC;
uniform sampler2D u_tex;
uniform vec2 u_res;
uniform int   u_modeSVideo;  // 1 = skip subcarrier crosstalk
uniform int   u_modeRGB;     // 1 = bypass
uniform float u_brightness;
uniform float u_genFade;     // generation fade (lowers chroma each pass)

vec3 yiq2rgb(vec3 c) {
  return mat3(
    1.0,  1.0,  1.0,
    0.956, -0.272, -1.106,
    0.621, -0.647, 1.703
  ) * c;
}

void main() {
  vec4 packed = texture(u_tex, v_uv);
  if (u_modeRGB == 1) { outC = vec4(packed.rgb * u_brightness, 1.0); return; }

  // Recover Y by horizontally averaging composite (cancels subcarrier ripple).
  float pxStep = 1.0 / u_res.x;
  float y =
      0.0625 * texture(u_tex, v_uv + vec2(-3.0*pxStep, 0.0)).r
    + 0.1250 * texture(u_tex, v_uv + vec2(-2.0*pxStep, 0.0)).r
    + 0.1875 * texture(u_tex, v_uv + vec2(-1.0*pxStep, 0.0)).r
    + 0.2500 * packed.r
    + 0.1875 * texture(u_tex, v_uv + vec2( 1.0*pxStep, 0.0)).r
    + 0.1250 * texture(u_tex, v_uv + vec2( 2.0*pxStep, 0.0)).r
    + 0.0625 * texture(u_tex, v_uv + vec2( 3.0*pxStep, 0.0)).r;

  vec2 chroma;
  if (u_modeSVideo == 1) {
    // S-Video: trust the encoder's clean Y/I — no demod, no dot crawl.
    // Recover I from packed.b (we packed I*0.5+0.5 in encoder).
    float I = packed.b * 2.0 - 1.0;
    // Q wasn't packed; reconstruct from composite using sine quadrature.
    float px = v_uv.x * u_res.x;
    float phase = px * 1.5707963;
    float Q = 0.0;
    for (int i = -3; i <= 3; ++i) {
      float fi = float(i);
      vec2 off = vec2(fi * pxStep, 0.0);
      float comp = texture(u_tex, v_uv + off).r;
      float ph = phase + fi * 1.5707963;
      Q += (comp - y) * cos(ph);
    }
    Q *= (1.0 / 4.0);
    chroma = vec2(I, Q);
  } else {
    // Composite demod: extract I,Q by subcarrier-locked sampling. The phase
    // relationship to the encoder produces real dot-crawl & cross-color.
    float px = v_uv.x * u_res.x;
    float phase = px * 1.5707963;
    float I = 0.0, Q = 0.0;
    for (int i = -3; i <= 3; ++i) {
      float fi = float(i);
      float comp = texture(u_tex, v_uv + vec2(fi * pxStep, 0.0)).r;
      float ph = phase + fi * 1.5707963;
      I += (comp - y) * sin(ph);
      Q += (comp - y) * cos(ph);
    }
    I *= 1.0 / 4.0;
    Q *= 1.0 / 4.0;
    chroma = vec2(I, Q);
  }

  chroma *= u_genFade;
  vec3 rgb = yiq2rgb(vec3(y, chroma));
  outC = vec4(clamp(rgb * u_brightness, 0.0, 1.0), 1.0);
}
`;

// Pass-through copy shader used to chain framebuffers cleanly when generation>1.
const FS_COPY = `#version 300 es
precision highp float;
in vec2 v_uv;
out vec4 outC;
uniform sampler2D u_tex;
void main() { outC = texture(u_tex, v_uv); }
`;

function compile(src, type) {
  const sh = gl.createShader(type);
  gl.shaderSource(sh, src);
  gl.compileShader(sh);
  if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(sh), src);
    throw new Error('shader compile failed');
  }
  return sh;
}

function program(fs) {
  const p = gl.createProgram();
  gl.attachShader(p, compile(VS, gl.VERTEX_SHADER));
  gl.attachShader(p, compile(fs, gl.FRAGMENT_SHADER));
  gl.bindAttribLocation(p, 0, 'a_pos');
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
    console.error(gl.getProgramInfoLog(p));
    throw new Error('link failed');
  }
  return p;
}

const PROG_ENC = program(FS_ENCODE);
const PROG_DST = program(FS_DISTORT);
const PROG_DEC = program(FS_DECODE);
const PROG_CPY = program(FS_COPY);

// fullscreen triangle
const vbo = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1, 3]), gl.STATIC_DRAW);
const vao = gl.createVertexArray();
gl.bindVertexArray(vao);
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);

// Texture for source frame.
const srcTex = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D, srcTex);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

// Two ping-pong framebuffers for the encode→distort→decode chain.
function makeFBO(w, h) {
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA8, w, h, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  const fb = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fb);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  return { tex, fb, w, h };
}
let fboA = null, fboB = null;
function ensureFBOs(w, h) {
  if (fboA && fboA.w === w && fboA.h === h) return;
  if (fboA) { gl.deleteTexture(fboA.tex); gl.deleteFramebuffer(fboA.fb); }
  if (fboB) { gl.deleteTexture(fboB.tex); gl.deleteFramebuffer(fboB.fb); }
  fboA = makeFBO(w, h);
  fboB = makeFBO(w, h);
}

// ---- state ------------------------------------------------------------------
const state = {
  source: pickSrc || 'phonelink',
  outW: 1080, outH: 1920,
  noise: 0.04, chroma: 0.55, dot: 0.6, ring: 0.35, jit: 0.0015,
  hue: 0.04, hsw: 14, sat: 1.05, lum: 1.0, taps: 9, gen: 1,
  mode: 'composite',
  videoReady: false,
  srcW: 0, srcH: 0,
  stream: null,
  testCanvas: null,
};

const PRESETS = {
  vhs:    { noise:0.06, chroma:0.7,  dot:0.7, ring:0.4,  jit:0.003,  hue:0.05, hsw:18, sat:1.1, lum:1.0, taps:11, gen:2, mode:'composite' },
  cable:  { noise:0.02, chroma:0.4,  dot:0.45, ring:0.25, jit:0.001, hue:0.0,  hsw:0,  sat:1.0, lum:1.0, taps:7,  gen:1, mode:'composite' },
  dirty:  { noise:0.18, chroma:0.85, dot:1.1, ring:0.55, jit:0.008,  hue:0.18, hsw:38, sat:1.2, lum:0.9, taps:13, gen:3, mode:'composite' },
  clean:  { noise:0.01, chroma:0.25, dot:0.0, ring:0.15, jit:0.0,    hue:0.0,  hsw:0,  sat:1.0, lum:1.0, taps:5,  gen:1, mode:'svideo' },
  off:    { noise:0.0,  chroma:0.0,  dot:0.0, ring:0.0,  jit:0.0,    hue:0.0,  hsw:0,  sat:1.0, lum:1.0, taps:3,  gen:1, mode:'rgb' },
};

function applyPreset(name) {
  const p = PRESETS[name];
  if (!p) return;
  for (const k of Object.keys(p)) state[k] = p[k];
  syncUI();
}

function syncUI() {
  $('noise').value = state.noise;  $('v_noise').textContent = state.noise.toFixed(3);
  $('chroma').value = state.chroma; $('v_chroma').textContent = state.chroma.toFixed(2);
  $('dot').value = state.dot;       $('v_dot').textContent = state.dot.toFixed(2);
  $('ring').value = state.ring;     $('v_ring').textContent = state.ring.toFixed(2);
  $('jit').value = state.jit;       $('v_jit').textContent = state.jit.toFixed(4);
  $('hue').value = state.hue;       $('v_hue').textContent = state.hue.toFixed(3);
  $('hsw').value = state.hsw;       $('v_hsw').textContent = String(state.hsw|0);
  $('sat').value = state.sat;       $('v_sat').textContent = state.sat.toFixed(2);
  $('lum').value = state.lum;       $('v_lum').textContent = state.lum.toFixed(2);
  $('taps').value = state.taps;     $('v_taps').textContent = String(state.taps|0);
  $('gen').value = state.gen;       $('v_gen').textContent = String(state.gen|0);
  $('mode').value = state.mode;
}

function bindRange(id, key, parse=parseFloat, dec=3) {
  const el = $(id), out = $('v_'+id);
  el.addEventListener('input', () => {
    state[key] = parse(el.value);
    out.textContent = (typeof state[key] === 'number' && !Number.isInteger(state[key])) ? state[key].toFixed(dec) : String(state[key]);
  });
}
bindRange('noise', 'noise');
bindRange('chroma','chroma',parseFloat,2);
bindRange('dot','dot',parseFloat,2);
bindRange('ring','ring',parseFloat,2);
bindRange('jit','jit',parseFloat,4);
bindRange('hue','hue',parseFloat,3);
bindRange('hsw','hsw',(v)=>parseInt(v,10),0);
bindRange('sat','sat',parseFloat,2);
bindRange('lum','lum',parseFloat,2);
bindRange('taps','taps',(v)=>parseInt(v,10),0);
bindRange('gen','gen',(v)=>parseInt(v,10),0);
$('mode').addEventListener('change', () => state.mode = $('mode').value);
document.querySelectorAll('.preset button').forEach(b => b.addEventListener('click', () => applyPreset(b.dataset.p)));

// ---- source switching -------------------------------------------------------
const vid = $('vid');

// Substrings (lowercased) that mark a Phone-Link / Win11 virtual webcam.
// Match generously — Microsoft has shipped 3+ different labels over time.
const PHONE_LINK_HINTS = [
  'phone link', 'windows virtual camera', 'virtual camera (windows',
  'phone camera', 'samsung camera', 'connected camera',
];

function isPhoneLinkLabel(label) {
  const s = (label || '').toLowerCase();
  return PHONE_LINK_HINTS.some(h => s.includes(h));
}

async function listCameras(autoSelect) {
  const sel = $('device');
  try {
    // Prompt once so we get device labels.
    const tmp = await navigator.mediaDevices.getUserMedia({ video: true, audio: false }).catch(()=>null);
    if (tmp) tmp.getTracks().forEach(t => t.stop());
    const devs = await navigator.mediaDevices.enumerateDevices();
    const cams = devs.filter(d => d.kind === 'videoinput');
    sel.innerHTML = '';
    if (!cams.length) { sel.innerHTML = '<option>no cameras</option>'; return null; }
    for (const c of cams) {
      const opt = document.createElement('option');
      opt.value = c.deviceId;
      opt.textContent = c.label || ('camera ' + sel.children.length);
      sel.appendChild(opt);
    }
    let chosen = null;
    if (autoSelect === 'phonelink') {
      for (const opt of sel.options) {
        if (isPhoneLinkLabel(opt.textContent)) { sel.value = opt.value; chosen = opt; break; }
      }
      if (!chosen) {
        setStatus('Phone Link cam not found — enable Phone Link → Devices → "Use as connected camera" on PC, then ↻ rescan');
      }
    } else if (pickCam) {
      for (const opt of sel.options) {
        if (opt.textContent.toLowerCase().includes(pickCam.toLowerCase())) {
          sel.value = opt.value; chosen = opt; break;
        }
      }
    }
    return chosen ? chosen.value : sel.value;
  } catch (e) {
    sel.innerHTML = '<option>enumeration failed</option>';
    setStatus('camera enumerate: ' + e.message);
    return null;
  }
}

async function startCamera(deviceId) {
  stopStream();
  try {
    const constraints = { video: deviceId ? { deviceId: { exact: deviceId } } : true, audio: false };
    const stream = await navigator.mediaDevices.getUserMedia(constraints);
    state.stream = stream;
    vid.srcObject = stream;
    await vid.play().catch(()=>{});
    setStatus('camera live');
  } catch (e) {
    setStatus('camera error: ' + e.message);
  }
}

async function startDisplay() {
  stopStream();
  try {
    const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: false });
    state.stream = stream;
    vid.srcObject = stream;
    await vid.play().catch(()=>{});
    setStatus('display capture live');
  } catch (e) {
    setStatus('display capture: ' + e.message);
  }
}

function stopStream() {
  if (state.stream) {
    state.stream.getTracks().forEach(t => t.stop());
    state.stream = null;
  }
  vid.srcObject = null;
  vid.removeAttribute('src');
  vid.load();
}

function loadFileBlob(file) {
  stopStream();
  const url = URL.createObjectURL(file);
  vid.src = url;
  vid.loop = true;
  vid.play().catch(()=>{});
  setStatus('file: ' + file.name);
}

function loadURL(u) {
  stopStream();
  vid.src = u;
  vid.loop = true;
  vid.crossOrigin = 'anonymous';
  vid.play().catch(()=>{});
  setStatus('url: ' + u);
}

function makeTestPattern() {
  const c = document.createElement('canvas');
  c.width = 1280; c.height = 720;
  const ctx = c.getContext('2d');
  // SMPTE-ish color bars
  const bars = ['#bfbfbf','#bfbf00','#00bfbf','#00bf00','#bf00bf','#bf0000','#0000bf'];
  const w = c.width / bars.length;
  for (let i=0;i<bars.length;i++){ ctx.fillStyle = bars[i]; ctx.fillRect(i*w, 0, w, c.height*0.66); }
  // PLUGE
  ctx.fillStyle = '#000'; ctx.fillRect(0, c.height*0.66, c.width, c.height);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 64px monospace';
  ctx.fillText('NTSC TEST', 40, c.height*0.85);
  state.testCanvas = c;
  state.srcW = c.width; state.srcH = c.height;
  state.videoReady = true;
  setStatus('test pattern');
}

// ---- canvas sizing ----------------------------------------------------------
function applySize() {
  const v = $('size').value;
  if (v === 'match') {
    state.outW = state.srcW || 1280;
    state.outH = state.srcH || 720;
  } else {
    const [w,h] = v.split('x').map(Number);
    state.outW = w; state.outH = h;
  }
  cv.width = state.outW;
  cv.height = state.outH;
  ensureFBOs(state.outW, state.outH);
  fitCanvas();
}
function fitCanvas() {
  const stage = $('stage');
  const sw = stage.clientWidth, sh = stage.clientHeight;
  const ar = state.outW / state.outH;
  let w = sw, h = sw / ar;
  if (h > sh) { h = sh; w = sh * ar; }
  cv.style.width = w + 'px';
  cv.style.height = h + 'px';
}
window.addEventListener('resize', fitCanvas);

$('size').addEventListener('change', applySize);

// ---- source UI --------------------------------------------------------------
function showSourceRow() {
  $('cam-row').style.display = (state.source === 'cam' || state.source === 'phonelink') ? '' : 'none';
  $('file-row').style.display = state.source === 'file' ? '' : 'none';
  $('url-row').style.display = state.source === 'url' ? '' : 'none';
}
$('src').addEventListener('change', async () => {
  state.source = $('src').value;
  showSourceRow();
  if (state.source === 'cam') {
    const id = await listCameras();
    if (id) await startCamera(id);
  } else if (state.source === 'phonelink') {
    const id = await listCameras('phonelink');
    if (id) await startCamera(id);
  } else if (state.source === 'display') {
    await startDisplay();
  } else if (state.source === 'none') {
    makeTestPattern();
  } else if (state.source === 'file') {
    stopStream();
  } else if (state.source === 'url') {
    stopStream();
  }
});
$('device').addEventListener('change', () => startCamera($('device').value));
$('rescan').addEventListener('click', async () => {
  const id = await listCameras(state.source === 'phonelink' ? 'phonelink' : null);
  if (id) await startCamera(id);
});
$('file').addEventListener('change', e => { const f = e.target.files[0]; if (f) loadFileBlob(f); });
$('filebtn').addEventListener('click', () => $('file').click());
$('loadurl').addEventListener('click', () => { const u = $('url').value.trim(); if (u) loadURL(u); });
const drop = $('drop');
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('over'); });
drop.addEventListener('dragleave', () => drop.classList.remove('over'));
drop.addEventListener('drop', e => {
  e.preventDefault(); drop.classList.remove('over');
  const f = e.dataTransfer.files[0];
  if (f) { state.source = 'file'; $('src').value = 'file'; loadFileBlob(f); }
});

vid.addEventListener('loadedmetadata', () => {
  state.srcW = vid.videoWidth || 1280;
  state.srcH = vid.videoHeight || 720;
  state.videoReady = true;
  if ($('size').value === 'match') applySize();
});

// ---- panel toggle -----------------------------------------------------------
$('toggle').addEventListener('click', () => $('panel').classList.toggle('hide'));
if (hidePanel) $('panel').classList.add('hide');

function setStatus(s) { $('status').textContent = s; }

// ---- render loop ------------------------------------------------------------
function uniLoc(p, n) { return gl.getUniformLocation(p, n); }

function uploadSource() {
  let src = null;
  if (state.source === 'cam' || state.source === 'display' || state.source === 'file' || state.source === 'url') {
    if (vid.readyState >= 2 && vid.videoWidth > 0) {
      src = vid;
      state.srcW = vid.videoWidth;
      state.srcH = vid.videoHeight;
      state.videoReady = true;
    }
  } else if (state.source === 'none' && state.testCanvas) {
    src = state.testCanvas;
  }
  if (!src) return false;
  gl.bindTexture(gl.TEXTURE_2D, srcTex);
  gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
  try { gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, src); }
  catch (e) { /* CORS or not-ready */ return false; }
  gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, false);
  return true;
}

function drawTri() { gl.drawArrays(gl.TRIANGLES, 0, 3); }

function passEncode(srcTexId, dstFbo) {
  gl.useProgram(PROG_ENC);
  gl.bindFramebuffer(gl.FRAMEBUFFER, dstFbo.fb);
  gl.viewport(0, 0, dstFbo.w, dstFbo.h);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, srcTexId);
  gl.uniform1i(uniLoc(PROG_ENC, 'u_tex'), 0);
  gl.uniform2f(uniLoc(PROG_ENC, 'u_res'), dstFbo.w, dstFbo.h);
  gl.uniform2f(uniLoc(PROG_ENC, 'u_srcRes'), state.srcW, state.srcH);
  gl.uniform1f(uniLoc(PROG_ENC, 'u_chromaBleed'), state.chroma);
  gl.uniform1i(uniLoc(PROG_ENC, 'u_taps'), state.taps);
  gl.uniform1f(uniLoc(PROG_ENC, 'u_subcarrier'), state.dot);
  gl.uniform1f(uniLoc(PROG_ENC, 'u_jitter'), state.jit);
  gl.uniform1f(uniLoc(PROG_ENC, 'u_time'), performance.now() * 0.001);
  gl.uniform1f(uniLoc(PROG_ENC, 'u_brightness'), state.lum);
  gl.uniform1f(uniLoc(PROG_ENC, 'u_saturation'), state.sat);
  gl.uniform1f(uniLoc(PROG_ENC, 'u_hueDrift'), state.hue);
  gl.uniform1i(uniLoc(PROG_ENC, 'u_modeRGB'), state.mode === 'rgb' ? 1 : 0);
  drawTri();
}

function passDistort(srcTexId, dstFbo) {
  gl.useProgram(PROG_DST);
  gl.bindFramebuffer(gl.FRAMEBUFFER, dstFbo.fb);
  gl.viewport(0, 0, dstFbo.w, dstFbo.h);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, srcTexId);
  gl.uniform1i(uniLoc(PROG_DST, 'u_tex'), 0);
  gl.uniform2f(uniLoc(PROG_DST, 'u_res'), dstFbo.w, dstFbo.h);
  gl.uniform1f(uniLoc(PROG_DST, 'u_noise'), state.noise);
  gl.uniform1f(uniLoc(PROG_DST, 'u_time'), performance.now() * 0.001);
  gl.uniform1f(uniLoc(PROG_DST, 'u_headSwitchPx'), state.hsw);
  gl.uniform1f(uniLoc(PROG_DST, 'u_ringing'), state.ring);
  drawTri();
}

function passDecodeToScreen(srcTexId, genFade) {
  gl.useProgram(PROG_DEC);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.viewport(0, 0, cv.width, cv.height);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, srcTexId);
  gl.uniform1i(uniLoc(PROG_DEC, 'u_tex'), 0);
  gl.uniform2f(uniLoc(PROG_DEC, 'u_res'), cv.width, cv.height);
  gl.uniform1i(uniLoc(PROG_DEC, 'u_modeSVideo'), state.mode === 'svideo' ? 1 : 0);
  gl.uniform1i(uniLoc(PROG_DEC, 'u_modeRGB'), state.mode === 'rgb' ? 1 : 0);
  gl.uniform1f(uniLoc(PROG_DEC, 'u_brightness'), state.lum);
  gl.uniform1f(uniLoc(PROG_DEC, 'u_genFade'), genFade);
  drawTri();
}

function passDecodeToFBO(srcTexId, dstFbo, genFade) {
  gl.useProgram(PROG_DEC);
  gl.bindFramebuffer(gl.FRAMEBUFFER, dstFbo.fb);
  gl.viewport(0, 0, dstFbo.w, dstFbo.h);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, srcTexId);
  gl.uniform1i(uniLoc(PROG_DEC, 'u_tex'), 0);
  gl.uniform2f(uniLoc(PROG_DEC, 'u_res'), dstFbo.w, dstFbo.h);
  gl.uniform1i(uniLoc(PROG_DEC, 'u_modeSVideo'), state.mode === 'svideo' ? 1 : 0);
  gl.uniform1i(uniLoc(PROG_DEC, 'u_modeRGB'), state.mode === 'rgb' ? 1 : 0);
  gl.uniform1f(uniLoc(PROG_DEC, 'u_brightness'), state.lum);
  gl.uniform1f(uniLoc(PROG_DEC, 'u_genFade'), genFade);
  drawTri();
}

let frame = 0, fpsTime = performance.now(), fpsCount = 0, fpsShown = '–';
function tick() {
  requestAnimationFrame(tick);
  const ok = uploadSource();
  if (!ok) return;

  // Generation = N: encode→distort→decode N times. After each decode, the
  // result becomes the new source for the next pass. Emulates re-recording
  // a tape over and over.
  const gens = Math.max(1, state.gen|0);
  let sourceTex = srcTex;
  for (let g = 0; g < gens; g++) {
    passEncode(sourceTex, fboA);
    passDistort(fboA.tex, fboB);
    if (g === gens - 1) {
      // Final pass goes to screen.
      const fade = Math.pow(0.92, g);
      passDecodeToScreen(fboB.tex, fade);
    } else {
      // Intermediate pass goes back into a FBO so next gen can read it.
      const fade = Math.pow(0.95, g);
      passDecodeToFBO(fboB.tex, fboA, fade);
      sourceTex = fboA.tex;
    }
  }

  frame++; fpsCount++;
  const now = performance.now();
  if (now - fpsTime >= 1000) {
    fpsShown = (fpsCount * 1000 / (now - fpsTime)).toFixed(0);
    fpsTime = now; fpsCount = 0;
    setStatus(`live · ${cv.width}×${cv.height} · ${fpsShown} fps · src ${state.srcW}×${state.srcH}`);
  }
}

// ---- boot -------------------------------------------------------------------
async function boot() {
  syncUI();
  $('src').value = state.source;
  showSourceRow();
  if (pickSize) { $('size').value = pickSize; }
  applySize();
  if (pickPreset && PRESETS[pickPreset]) applyPreset(pickPreset);

  if (state.source === 'cam') {
    const id = await listCameras();
    if (id) await startCamera(id);
  } else if (state.source === 'phonelink') {
    const id = await listCameras('phonelink');
    if (id) await startCamera(id);
  } else if (state.source === 'display') {
    await startDisplay();
  } else if (state.source === 'url' && startURL) {
    $('url').value = startURL; loadURL(startURL);
  } else if (state.source === 'none') {
    makeTestPattern();
  }

  requestAnimationFrame(tick);
}

boot().catch(e => setStatus('boot error: ' + e.message));
</script>
</body>
</html>
